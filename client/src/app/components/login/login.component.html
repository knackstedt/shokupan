<div class="login-screen">
    <div class="login-card">
        <div class="logo">
            <span class="logo-icon">🍞</span>
            <h1>Shokupan</h1>
            <p class="subtitle">Admin Console</p>
        </div>

        <div class="providers">
            <p class="sign-in-label">Sign in with</p>
            @for (p of providers; track p.id) {
            <button class="provider-btn" (click)="auth.login(p.id)">
                <span class="provider-icon" [innerHTML]="p.icon"></span>
                <span>{{ p.label }}</span>
            </button>
            }
        </div>
    </div>
</div>
