<div class="network-tools-container">
    <div class="toolbar">
        <button class="btn-icon" (click)="clear()" title="Clear">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="50%" cy="50%" r="40%" />
                <line x1="25%" y1="15%" x2="75%" y2="85%" />
            </svg>
        </button>
        <div class="divider"></div>
        <div class="direction-filter">
            <button class="direction-btn" [class.active]="directionFilter === 'all'" (click)="setDirectionFilter('all')">All</button>
            <button class="direction-btn" [class.active]="directionFilter === 'inbound'" (click)="setDirectionFilter('inbound')">Inbound</button>
            <button class="direction-btn" [class.active]="directionFilter === 'outbound'" (click)="setDirectionFilter('outbound')">Outbound</button>
        </div>
        <div class="divider"></div>
        <div class="filter-group">
            <label class="filter-checkbox">
                <input type="checkbox" [ngModel]="excludePlugins" (ngModelChange)="togglePluginFilter()" />
                <span>Excl. Plugins</span>
            </label>
            <label class="filter-checkbox">
                <input type="checkbox" [ngModel]="excludeStatic" (ngModelChange)="toggleStaticFilter()" />
                <span>Excl. Static</span>
            </label>
            <label class="filter-checkbox">
                <input type="checkbox" [ngModel]="excludeProxied" (ngModelChange)="toggleProxiedFilter()" />
                <span>Excl. Proxied</span>
            </label>
        </div>
    </div>

    <div class="content">
        <as-split direction="horizontal" [gutterSize]="4">
            <as-split-area [size]="selectedRequest() ? 40 : 100">
                <skp-request-list #requestList [requests]="requests()" [(selectedId)]="selectedId" [contextMenu]="cm"
                    (onSelect)="selectRequest($any($event))"
                    (onContextMenu)="onRowContextMenu($any($event))"></skp-request-list>
            </as-split-area>

            @if (selectedRequest()) {
            <as-split-area [size]="60">
                <skp-request-details [request]="selectedRequest()!"
                    (onClose)="selectRequest(null)"></skp-request-details>
            </as-split-area>
            }
        </as-split>
    </div>

    <p-contextMenu #cm [model]="menuItems"></p-contextMenu>

    @if (showReplayModal()) {
    <skp-replay-modal [request]="replayRequest()!" [visible]="showReplayModal()"
        (onClose)="showReplayModal.set(false)"></skp-replay-modal>
    }
</div>
