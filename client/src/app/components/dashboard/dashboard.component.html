<div class="dashboard-wrapper">
    <!-- Sub-navigation Tabs -->
    <div class="dash-tabs">
        <button class="dash-tab" [class.active]="activeTab() === 'overview'"
            (click)="setTab('overview')">Overview</button>
        <button class="dash-tab" [class.active]="activeTab() === 'application'"
            (click)="setTab('application')">Application</button>
        <button class="dash-tab" [class.active]="activeTab() === 'network'" (click)="setTab('network')">Network</button>
    </div>

    <div class="dash-content">
        @switch (activeTab()) {
        @case ('overview') {
        <skp-dashboard-overview [metrics]="metrics()" [requests]="requests()" [wsConnected]="wsConnected()"
            (requestSelect)="selectRequest($event)" (purge)="purgeRequests()">
        </skp-dashboard-overview>
        }
        @case ('network') {
        <skp-network-tools [requests]="requests()" [(selectedId)]="selectedRequestId"
            (onClear)="purgeRequests()"></skp-network-tools>
        }
        @case ('application') {
        <div class="view-toggle">
            <button class="toggle-btn" [class.active]="viewMode() === 'graph'" (click)="setViewMode('graph')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
                Graph
            </button>
            <button class="toggle-btn" [class.active]="viewMode() === 'tree'" (click)="setViewMode('tree')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                    <line x1="12" y1="22.08" x2="12" y2="12" />
                </svg>
                Tree
            </button>
        </div>

        @if (viewMode() === 'tree') {
        <skp-app-registry-tree [rawData]="appData()" [metrics]="metrics()"
            [requests]="requests()"></skp-app-registry-tree>
        } @else {
        <skp-app-graph [rawData]="appData()" [metrics]="metrics()" [requests]="requests()"></skp-app-graph>
        }
        }
        }
    </div>
</div>
