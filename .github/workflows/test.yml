name: Test

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'bun.lock'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'bun.lock'
      - '.github/workflows/test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run Tests
        run: bun test

  test-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-client-${{ hashFiles('client/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-client-

      - name: Install Client Dependencies
        working-directory: ./client
        run: bun install --frozen-lockfile

      - name: Run Client Tests
        working-directory: ./client
        run: bun run test:ci