name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install Dependencies
        run: bun install
      
      - name: Install Peer Dependencies
        run: |
          bun install ajv@^8.0.0 \
            ajv-formats@^3.0.0 \
            arctic@^3.0.0 \
            class-transformer@^0.5.0 \
            class-validator@^0.14.0 \
            eta@^4.0.0 \
            jose@^6.0.0 \
            parse-json@^8.0.0 \
            reflect-metadata@^0.2.0 \
            secure-json-parse@^4.0.0 \
            @scalar/api-reference@^1.0.0 \
            @surrealdb/node@^2.4.0 \
            surrealdb@^2.0.0-alpha.14
        
      - name: Build
        run: bun run build
        
      - name: Run Tests
        run: bun test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Install Dependencies
        run: bun install
      
      - name: Install Peer Dependencies
        run: |
          bun install ajv@^8.0.0 \
            ajv-formats@^3.0.0 \
            arctic@^3.0.0 \
            class-transformer@^0.5.0 \
            class-validator@^0.14.0 \
            eta@^4.0.0 \
            jose@^6.0.0 \
            parse-json@^8.0.0 \
            reflect-metadata@^0.2.0 \
            secure-json-parse@^4.0.0 \
            @scalar/api-reference@^1.0.0 \
            @surrealdb/node@^2.4.0 \
            surrealdb@^2.0.0-alpha.14
        
      - name: Build
        run: bun run build
        
      - name: Publish to NPM
        run: npm publish --provenance
        # env:
          # NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
